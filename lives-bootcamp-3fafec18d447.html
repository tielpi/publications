<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Carnet protégé</title>
<style>
  :root {
    --bg: #F3F5F2; --card: #FBFCFA; --ink: #1F261E; --muted: #5A645A;
    --accent: #2F6647; --ochre: #8A5F1D; --rule: #D3DBD1;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141913; --card: #191F18; --ink: #E3E9E0; --muted: #9AA598;
      --accent: #82C398; --ochre: #D3AE68; --rule: #2A3229;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--ink);
    font-family: "Avenir Next", Avenir, "Segoe UI", system-ui, sans-serif;
    padding: 1.5rem;
  }
  .gate { width: 100%; max-width: 26rem; }
  .band { height: 4px; margin-bottom: 1.8rem; background: linear-gradient(90deg, var(--accent), var(--ochre)); }
  .eyebrow { font-size: .72rem; letter-spacing: .16em; text-transform: uppercase; color: var(--ochre); font-weight: 600; margin: 0 0 .5rem; }
  h1 { font-family: "Palatino Linotype", Palatino, Georgia, serif; font-size: 1.45rem; font-weight: 700; color: var(--accent); margin: 0 0 .4rem; line-height: 1.2; }
  p.sub { margin: 0 0 1.6rem; color: var(--muted); font-size: .95rem; line-height: 1.5; }
  label { display: block; font-size: .8rem; font-weight: 600; margin: 0 0 .4rem; }
  input {
    width: 100%; padding: .7rem .8rem; font-size: 1rem; border: 1px solid var(--rule);
    border-radius: 4px; background: var(--card); color: var(--ink);
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    margin-top: 1rem; width: 100%; padding: .75rem; font-size: 1rem; font-weight: 600;
    color: #fff; background: var(--accent); border: 0; border-radius: 4px; cursor: pointer;
  }
  button:hover { filter: brightness(1.1); }
  .err { margin-top: .9rem; color: var(--ochre); font-size: .85rem; min-height: 1.2em; }
  .foot { margin-top: 2rem; font-size: .75rem; color: var(--muted); }
</style>
</head>
<body>
<form class="gate" id="gate" autocomplete="off">
  <div class="band"></div>
  <p class="eyebrow">Bootcamp IA personnelle</p>
  <h1>Carnet de notes protégé</h1>
  <p class="sub">Ces notes sont réservées aux participants du bootcamp. Saisissez le mot de passe pour ouvrir le carnet.</p>
  <label for="pw">Mot de passe</label>
  <input type="password" id="pw" autofocus>
  <button type="submit">Ouvrir le carnet</button>
  <div class="err" id="err" role="alert"></div>
  <p class="foot">Contenu chiffré dans la page, déchiffré uniquement dans votre navigateur.</p>
</form>
